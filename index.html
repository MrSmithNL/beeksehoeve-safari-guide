<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#2d5016">
  <title>Beeksehoeve Safari Guide</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    :root {
      --green-dark: #1a3a0a;
      --green-mid: #2d5016;
      --green-light: #4a7a2a;
      --green-pale: #e8f0e0;
      --gold: #c8a84e;
      --gold-light: #e8d08e;
      --white: #ffffff;
      --text: #1a1a1a;
      --text-light: #666;
      --radius: 16px;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--green-dark);
      color: var(--white);
      touch-action: manipulation;
    }

    .app {
      display: flex;
      flex-direction: column;
      height: 100%;
      max-width: 500px;
      margin: 0 auto;
    }

    /* ---- HEADER ---- */
    .header {
      padding: 12px 20px;
      text-align: center;
      background: var(--green-mid);
      border-bottom: 2px solid var(--gold);
      flex-shrink: 0;
    }
    .header h1 {
      font-size: 18px;
      font-weight: 700;
      color: var(--gold);
      letter-spacing: 0.5px;
    }
    .header .subtitle {
      font-size: 12px;
      color: var(--green-pale);
      margin-top: 2px;
    }

    /* ---- LANGUAGE SELECTOR ---- */
    .lang-bar {
      display: flex;
      gap: 8px;
      justify-content: center;
      padding: 12px 20px;
      background: var(--green-dark);
      flex-shrink: 0;
    }
    .lang-btn {
      flex: 1;
      max-width: 120px;
      padding: 10px 0;
      border: 2px solid var(--green-light);
      border-radius: 12px;
      background: transparent;
      color: var(--white);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .lang-btn.active {
      background: var(--gold);
      border-color: var(--gold);
      color: var(--green-dark);
    }
    .lang-btn:active { transform: scale(0.95); }
    .lang-flag { font-size: 20px; }

    /* ---- DOWNLOAD BAR ---- */
    .download-bar {
      padding: 0 20px 8px;
      background: var(--green-dark);
      flex-shrink: 0;
    }
    .download-btn {
      width: 100%;
      padding: 10px;
      border: 2px solid var(--green-light);
      border-radius: 12px;
      background: transparent;
      color: var(--green-pale);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .download-btn:active { transform: scale(0.98); }
    .download-btn.downloading {
      border-color: var(--gold);
      color: var(--gold);
    }
    .download-btn.done {
      border-color: var(--green-light);
      background: var(--green-light);
      color: var(--white);
    }
    .download-progress {
      width: 100%;
      height: 4px;
      background: var(--green-dark);
      border-radius: 2px;
      margin-top: 6px;
      overflow: hidden;
      display: none;
    }
    .download-progress.show { display: block; }
    .download-progress-fill {
      height: 100%;
      background: var(--gold);
      border-radius: 2px;
      width: 0%;
      transition: width 0.3s;
    }

    /* ---- CHAPTER LIST ---- */
    .chapter-list {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px;
      -webkit-overflow-scrolling: touch;
    }
    .chapter-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px;
      margin-bottom: 8px;
      background: var(--green-mid);
      border-radius: var(--radius);
      cursor: pointer;
      transition: all 0.2s;
      border: 2px solid transparent;
    }
    .chapter-item:active { transform: scale(0.98); }
    .chapter-item.active {
      border-color: var(--gold);
      background: var(--green-light);
    }
    .chapter-item.playing .chapter-num {
      background: var(--gold);
      color: var(--green-dark);
    }
    .chapter-num {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--green-light);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 700;
      flex-shrink: 0;
      transition: all 0.2s;
    }
    .chapter-info { flex: 1; min-width: 0; }
    .chapter-title {
      font-size: 15px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .chapter-subtitle {
      font-size: 12px;
      color: var(--gold-light);
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .chapter-duration {
      font-size: 12px;
      color: var(--text-light);
      flex-shrink: 0;
    }

    /* ---- NOW PLAYING BAR ---- */
    .player {
      background: var(--green-mid);
      border-top: 2px solid var(--gold);
      padding: 16px 20px calc(16px + var(--safe-bottom));
      flex-shrink: 0;
    }
    .player-hidden { display: none; }

    .now-playing {
      text-align: center;
      margin-bottom: 12px;
    }
    .now-playing .track-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--gold);
    }
    .now-playing .track-subtitle {
      font-size: 11px;
      color: var(--green-pale);
      margin-top: 2px;
    }

    /* Progress bar */
    .progress-container {
      width: 100%;
      margin-bottom: 8px;
      cursor: pointer;
      padding: 4px 0;
    }
    .progress-bar {
      width: 100%;
      height: 8px;
      background: var(--green-dark);
      border-radius: 4px;
      overflow: visible;
      position: relative;
      cursor: pointer;
    }
    .progress-fill {
      height: 100%;
      background: var(--gold);
      border-radius: 4px;
      width: 0%;
      transition: width 0.1s linear;
      position: relative;
    }
    .progress-fill::after {
      content: '';
      position: absolute;
      right: -8px;
      top: -4px;
      width: 16px;
      height: 16px;
      background: var(--gold);
      border-radius: 50%;
      box-shadow: 0 0 4px rgba(0,0,0,0.3);
    }
    .progress-times {
      display: flex;
      justify-content: space-between;
      font-size: 14px;
      font-weight: 600;
      color: var(--white);
      margin-top: 6px;
    }

    /* Controls */
    .controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }
    .ctrl-btn {
      border: none;
      background: var(--green-light);
      color: var(--white);
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      -webkit-user-select: none;
      user-select: none;
    }
    .ctrl-btn:active { transform: scale(0.9); }
    .ctrl-btn svg { pointer-events: none; }

    .ctrl-small { width: 52px; height: 52px; }
    .ctrl-play {
      width: 72px;
      height: 72px;
      background: var(--gold);
      color: var(--green-dark);
    }
    .ctrl-play:active { background: var(--gold-light); }

    /* Volume */
    .volume-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 12px;
    }
    .volume-icon { color: var(--gold-light); flex-shrink: 0; }
    .volume-slider {
      flex: 1;
      -webkit-appearance: none;
      appearance: none;
      height: 6px;
      background: var(--green-dark);
      border-radius: 3px;
      outline: none;
    }
    .volume-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 24px;
      height: 24px;
      background: var(--gold);
      border-radius: 50%;
      cursor: pointer;
    }

    /* ---- OFFLINE BADGE ---- */
    .offline-badge {
      display: none;
      position: fixed;
      top: 8px;
      right: 8px;
      background: #cc3300;
      color: white;
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 20px;
      z-index: 100;
    }
    .offline-badge.show { display: block; }

    /* ---- LOADING SCREEN ---- */
    .loading-screen {
      position: fixed;
      inset: 0;
      background: var(--green-dark);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 200;
      transition: opacity 0.5s;
    }
    .loading-screen.hide { opacity: 0; pointer-events: none; }
    .loading-logo {
      font-size: 28px;
      font-weight: 700;
      color: var(--gold);
      margin-bottom: 8px;
    }
    .loading-sub {
      font-size: 14px;
      color: var(--green-pale);
    }
  </style>
</head>
<body>
  <div class="offline-badge" id="offlineBadge">Offline</div>

  <div class="loading-screen" id="loadingScreen">
    <div class="loading-logo">Beeksehoeve</div>
    <div class="loading-sub">Safari Guide</div>
  </div>

  <div class="app">
    <!-- Header -->
    <div class="header">
      <h1>BEEKSEHOEVE SAFARI GUIDE</h1>
      <div class="subtitle">Safari Express Audio Tour</div>
    </div>

    <!-- Language selector -->
    <div class="lang-bar">
      <button class="lang-btn active" data-lang="nl" onclick="setLang('nl')">
        <span class="lang-flag">&#x1F1F3;&#x1F1F1;</span> NL
      </button>
      <button class="lang-btn" data-lang="en" onclick="setLang('en')">
        <span class="lang-flag">&#x1F1EC;&#x1F1E7;</span> EN
      </button>
      <button class="lang-btn" data-lang="de" onclick="setLang('de')">
        <span class="lang-flag">&#x1F1E9;&#x1F1EA;</span> DE
      </button>
    </div>

    <!-- Download for offline -->
    <div class="download-bar">
      <button class="download-btn" id="downloadBtn" onclick="downloadAll()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
        <span id="downloadLabel">Download for offline use</span>
      </button>
      <div class="download-progress" id="downloadProgress">
        <div class="download-progress-fill" id="downloadProgressFill"></div>
      </div>
    </div>

    <!-- Chapter list -->
    <div class="chapter-list" id="chapterList"></div>

    <!-- Player controls -->
    <div class="player player-hidden" id="player">
      <div class="now-playing">
        <div class="track-title" id="trackTitle">—</div>
        <div class="track-subtitle" id="trackSubtitle"></div>
      </div>

      <div class="progress-container" id="progressContainer">
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="progress-times">
          <span id="timeElapsed">0:00</span>
          <span id="timeTotal">0:00</span>
        </div>
      </div>

      <div class="controls">
        <!-- Previous -->
        <button class="ctrl-btn ctrl-small" id="btnPrev" onclick="prevChapter()" aria-label="Previous">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
            <path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/>
          </svg>
        </button>

        <!-- Rewind 10s -->
        <button class="ctrl-btn ctrl-small" onclick="skip(-10)" aria-label="Rewind 10 seconds">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/>
            <text x="10" y="16" font-size="7" font-weight="bold" text-anchor="middle">10</text>
          </svg>
        </button>

        <!-- Play/Pause -->
        <button class="ctrl-btn ctrl-play" id="btnPlay" onclick="togglePlay()" aria-label="Play">
          <svg id="iconPlay" width="32" height="32" viewBox="0 0 24 24" fill="currentColor">
            <path d="M8 5v14l11-7z"/>
          </svg>
          <svg id="iconPause" width="32" height="32" viewBox="0 0 24 24" fill="currentColor" style="display:none">
            <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
          </svg>
        </button>

        <!-- Forward 10s -->
        <button class="ctrl-btn ctrl-small" onclick="skip(10)" aria-label="Forward 10 seconds">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 5V1l5 5-5 5V7c-3.31 0-6 2.69-6 6s2.69 6 6 6 6-2.69 6-6h2c0 4.42-3.58 8-8 8s-8-3.58-8-8 3.58-8 8-8z"/>
            <text x="14" y="16" font-size="7" font-weight="bold" text-anchor="middle">10</text>
          </svg>
        </button>

        <!-- Next -->
        <button class="ctrl-btn ctrl-small" id="btnNext" onclick="nextChapter()" aria-label="Next">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
            <path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/>
          </svg>
        </button>
      </div>

      <!-- Volume -->
      <div class="volume-row">
        <svg class="volume-icon" width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
          <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/>
        </svg>
        <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="80" oninput="setVolume(this.value)">
        <svg class="volume-icon" width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
          <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
        </svg>
      </div>
    </div>
  </div>

  <audio id="audioEl" preload="auto"></audio>
  <script src="chapters.js"></script>
  <script src="app.js"></script>
</body>
</html>
